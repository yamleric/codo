services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: codo
      POSTGRES_USER: codo
      POSTGRES_PASSWORD: codo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:

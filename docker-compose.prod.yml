services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      POSTGRES_DB: codo
      POSTGRES_USER: codo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codo"]
      interval: 10s
      retries: 5

  api:
    image: codo:latest
    restart: always
    command: ./api
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      DATABASE_URL: postgres://codo:${POSTGRES_PASSWORD}@postgres:5432/codo
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      ASR_BASE_URL: ${ASR_BASE_URL:-}
      ASR_API_KEY: ${ASR_API_KEY:-}
      ASR_MODEL: ${ASR_MODEL:-whisper-1}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      YTDLP_COOKIES_FROM_BROWSER: ${YTDLP_COOKIES_FROM_BROWSER:-}
      YTDLP_USER_AGENT: ${YTDLP_USER_AGENT:-}
      YTDLP_REFERER: ${YTDLP_REFERER:-}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-demo-user}
      WEB_DIR: ./web/dist
    volumes:
      - ./secrets:/run/codo-secrets:ro
      - ./browser-profile:/run/codo-browser-profile:ro
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    image: codo:latest
    restart: always
    command: ./scheduler
    environment:
      DATABASE_URL: postgres://codo:${POSTGRES_PASSWORD}@postgres:5432/codo
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      ASR_BASE_URL: ${ASR_BASE_URL:-}
      ASR_API_KEY: ${ASR_API_KEY:-}
      ASR_MODEL: ${ASR_MODEL:-whisper-1}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      YTDLP_COOKIES_FROM_BROWSER: ${YTDLP_COOKIES_FROM_BROWSER:-}
      YTDLP_USER_AGENT: ${YTDLP_USER_AGENT:-}
      YTDLP_REFERER: ${YTDLP_REFERER:-}
    volumes:
      - ./secrets:/run/codo-secrets:ro
      - ./browser-profile:/run/codo-browser-profile:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
